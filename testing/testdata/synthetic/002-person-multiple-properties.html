<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>002 Person Multiple Properties</title>
</head>
<body>
  <div itemscope itemtype="https://schema.org/Person">
    <span itemprop="name">Jane Doe</span>
    <span itemprop="jobTitle">Software Engineer</span>
    <span itemprop="email">jane@example.com</span>
    <a itemprop="url" href="/profile/jane">Profile</a>
    <img itemprop="image" src="/img/jane.jpg" alt="Jane">
  </div>
</body>
</html>
