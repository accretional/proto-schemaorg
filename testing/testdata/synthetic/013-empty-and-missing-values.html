<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>013 Empty and Missing Values</title>
</head>
<body>
  <div itemscope itemtype="https://schema.org/Thing"></div>

  <div itemscope itemtype="https://schema.org/Thing">
    <meta itemprop="metaEmpty">
    <data itemprop="dataEmpty">display text ignored</data>
    <img itemprop="imgEmpty" alt="no src">
    <a itemprop="linkEmpty">no href</a>
  </div>
</body>
</html>
