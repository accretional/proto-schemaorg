<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>005 itemref</title>
</head>
<body>
  <div itemscope itemtype="https://schema.org/Person" itemref="extra-props">
    <span itemprop="name">Alice</span>
  </div>

  <div id="extra-props">
    <span itemprop="jobTitle">Designer</span>
    <span itemprop="email">alice@example.com</span>
  </div>
</body>
</html>
